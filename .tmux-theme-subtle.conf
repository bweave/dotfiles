## COLORSCHEME: subtle
## Designed to blend into the terminal background with minimal contrast.
## Uses muted, low-contrast colors — no bold accents, no powerline glyphs.
set-option -g status "on"
set -g status-interval 2

# Use "default" as the background so it inherits the terminal's own bg
set-option -g status-fg '#5c6a72'
set-option -g status-bg default

set-option -g mode-style fg='#2d353b',bg='#859289'

# default statusbar colors
set-option -g status-style "fg=#5c6a72,bg=default"


# ---- Windows ----
set-window-option -g window-status-style fg='#5c6a72',bg=default
set-window-option -g window-status-activity-style fg='#859289',bg=default
set-window-option -g window-status-current-style fg='#859289',bg=default

# ---- Pane ----
set-option -g pane-border-style fg='#343f44'
set-option -g pane-active-border-style fg='#5c6a72'
set-option -g pane-border-lines single

# pane number display
set-option -g display-panes-active-colour '#859289'
set-option -g display-panes-colour '#5c6a72'

# ---- Command ----
set-option -g message-style fg='#d3c6aa',bg=default
set-option -g message-command-style fg='#859289',bg=default

# ---- Miscellaneous ----
set-window-option -g clock-mode-colour '#5c6a72'
set-window-option -g window-status-bell-style fg='#e67e80',bg=default

# ---- Formatting ----
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left '#[fg=#859289] #S '

set-option -g status-right-style none
set -g status-right-length 150
set -g status-right ''

set -g window-status-separator ''
set -g window-status-format " #I:#W"
set -g window-status-current-format " #I:#W"
